name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/autoinvestor

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker images to GitHub Container Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ steps.slug.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Backend -----------------------------------------------------------
      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Frontend ----------------------------------------------------------
      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to production server via SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s" << 'ENDSSH'
              set -euo pipefail

              echo "==> Navigating to deploy directory"
              cd "$DEPLOY_PATH"

              echo "==> Logging in to GitHub Container Registry"
              echo "${{ secrets.GITHUB_TOKEN }}" | \
                docker login ghcr.io -u "${{ github.actor }}" --password-stdin

              echo "==> Pulling latest images"
              IMAGE_TAG="$IMAGE_TAG" \
              docker-compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                pull backend frontend

              echo "==> Starting updated services (zero-downtime rolling restart)"
              IMAGE_TAG="$IMAGE_TAG" \
              docker-compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                up -d --no-build --remove-orphans

              echo "==> Running database migrations"
              docker-compose exec -T backend python -c \
                "from app.core.database import init_db; import asyncio; asyncio.run(init_db())"

              echo "==> Pruning dangling images"
              docker image prune -f

              echo "==> Deployment complete"
          ENDSSH

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment of commit ${{ github.sha }} succeeded."

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment FAILED for commit ${{ github.sha }}."
          exit 1
