version: "3.9"

# Production overrides — use with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    ports: []  # No external port exposure in production
    restart: always

  redis:
    ports: []  # No external port exposure in production
    restart: always

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports: []  # Traffic routed through nginx only
    restart: always

  frontend:
    ports: []  # Traffic routed through nginx only
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    restart: always

  worker:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    restart: always

  nginx:
    image: nginx:alpine
    container_name: autoinvestor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - autoinvestor-net
    restart: always
