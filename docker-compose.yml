version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoinvestor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: autoinvestor
      POSTGRES_USER: autoinvestor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoinvestor -d autoinvestor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - autoinvestor-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: autoinvestor-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - autoinvestor-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: autoinvestor-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - autoinvestor-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: autoinvestor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - autoinvestor-net
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: autoinvestor-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models
    command: python -m app.workers.scheduler
    networks:
      - autoinvestor-net
    restart: unless-stopped

networks:
  autoinvestor-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ml_models:
